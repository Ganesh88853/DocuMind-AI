# =============================================================================
# Redis configuration for DocuMind AI
# Minimal secure config for development/production
# =============================================================================

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence — save to disk every 60s if ≥1 key changed
save 60 1
save 300 10
save 900 1

# RDB file
dbfilename dump.rdb
dir /data

# Logging
loglevel notice
logfile ""

# Timeouts
timeout 300
tcp-keepalive 60

# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command CONFIG   ""
rename-command DEBUG    ""
rename-command SHUTDOWN SHUTDOWN_SAFE
