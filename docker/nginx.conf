# =============================================================================
# DocuMind AI — Nginx Configuration (Production)
# Serves as reverse proxy for API + static SPA host
# =============================================================================

# ── Upstream backend pool ─────────────────────────────────────────────────────
upstream backend_api {
    server backend:8000;
    keepalive 32;          # persistent connections to backend
}

# ── Gzip compression settings ─────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/woff
    font/woff2;

# ── Main server block ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                always;
    add_header X-Content-Type-Options     "nosniff"                   always;
    add_header X-XSS-Protection           "1; mode=block"             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self';"
        always;

    # ── Client upload size (must match backend MAX_UPLOAD_SIZE_MB) ────────────
    client_max_body_size 55M;

    # ── Health check — used by Docker HEALTHCHECK ─────────────────────────────
    location = /health {
        access_log off;
        return 200 '{"status":"ok","service":"nginx"}';
        add_header Content-Type application/json;
    }

    # ── API proxy — forward all /api/* requests to FastAPI backend ────────────
    location /api/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts for long-running AI requests
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        # Remove X-Powered-By / Server headers from backend responses
        proxy_hide_header X-Powered-By;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # ── Static assets — long cache ────────────────────────────────────────────
    # Vite produces hashed filenames so these are safe to cache aggressively
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── SPA fallback — React Router ───────────────────────────────────────────
    # All routes not matched above serve index.html
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Short cache on HTML (app shell updates often)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}
