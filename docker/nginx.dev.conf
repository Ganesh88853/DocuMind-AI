# =============================================================================
# DocuMind AI — Nginx Dev Configuration
# No caching, verbose logging, proxies to Vite HMR server
# =============================================================================

server {
    listen 80;
    server_name _;

    # Disable caching in development
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    client_max_body_size 55M;

    # Health check
    location = /health {
        access_log off;
        return 200 '{"status":"ok","service":"nginx-dev"}';
        add_header Content-Type application/json;
    }

    # API → FastAPI backend
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  300s;
        proxy_buffering     off;
    }

    # Vite HMR WebSocket — MUST be proxied for hot reload to work
    location /_vite/ {
        proxy_pass         http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # All other requests → Vite dev server
    location / {
        proxy_pass         http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }
}
