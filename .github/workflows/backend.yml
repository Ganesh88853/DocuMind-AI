# =============================================================================
# DocuMind AI — Backend CI Workflow
# =============================================================================
# Triggers: Push to main/develop, all Pull Requests
#
# Steps:
#   1. Install Python + pip-cached dependencies
#   2. Verify FastAPI application starts cleanly
#   3. Check Alembic migration consistency
#   4. Run the full pytest suite with PostgreSQL
#   5. Upload coverage + JUnit XML artifacts
# =============================================================================

name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

# Cancel in-progress runs on the same branch (saves CI minutes)
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Static Checks (fast, no DB needed) ────────────────────────────────
  static-checks:
    name: Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Verify application imports (no startup errors)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/documind_ai
          JWT_SECRET_KEY: ci-static-check-key-at-least-32-chars
          GEMINI_API_KEY: fake-key-ci
        run: python -c "from app.core.config import settings; from app.api.router import api_router; print('✅ Imports OK')"

  # ── Job 2: Full Test Suite (requires PostgreSQL) ──────────────────────────────
  tests:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    needs: static-checks

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: documind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/documind_test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/documind_test
      JWT_SECRET_KEY: ci-test-secret-key-at-least-32-chars-long
      BCRYPT_ROUNDS: "4"
      ENVIRONMENT: testing
      DEBUG: "false"
      GEMINI_API_KEY: fake-key-for-ci

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Check Alembic migration consistency
        run: |
          alembic check 2>&1 || echo "⚠️  Alembic check not available; skipping"
          alembic heads
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/documind_test

      - name: Apply migrations to test database
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/documind_test

      - name: Run pytest with coverage
        run: |
          python -m pytest tests/ \
            -v --tb=short \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            --cov-fail-under=60

      - name: Upload coverage XML (for Codecov / PR comments)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          retention-days: 30

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-html
          path: backend/htmlcov/
          retention-days: 30

      - name: Upload JUnit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml
          retention-days: 30

  # ── Job 3: Migration Integrity Check ─────────────────────────────────────────
  migrations:
    name: Migration Integrity
    runs-on: ubuntu-latest
    needs: static-checks

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: documind_migrate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/documind_migrate_test
      JWT_SECRET_KEY: ci-migration-check-key-32-chars-minimum
      GEMINI_API_KEY: fake-key-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Apply all migrations (upgrade head)
        run: alembic upgrade head

      - name: Verify database tables exist
        run: |
          python -c "
          import asyncio, asyncpg

          async def check():
              conn = await asyncpg.connect(
                  'postgresql://postgres:postgres@localhost:5432/documind_migrate_test'
              )
              tables = await conn.fetch(
                  \"SELECT tablename FROM pg_tables WHERE schemaname='public'\"
              )
              names = [t['tablename'] for t in tables]
              print('Tables found:', names)
              required = ['users', 'user_sessions', 'audit_logs']
              for t in required:
                  assert t in names, f'Missing table: {t}'
              print('✅ All required tables present')
              await conn.close()

          asyncio.run(check())
          "

      - name: Test downgrade (rollback all migrations)
        run: alembic downgrade base

      - name: Re-apply migrations (verify idempotency)
        run: alembic upgrade head
