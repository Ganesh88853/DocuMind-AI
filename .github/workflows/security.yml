# =============================================================================
# DocuMind AI — Security Workflow
# =============================================================================
# Runs on every Push and PR — blocks merges on critical findings.
#
# Checks:
#   1. Python dependency vulnerability scan (pip-audit / Safety)
#   2. Node.js dependency audit (npm audit)
#   3. Secret detection (Gitleaks — prevents committed secrets)
#   4. SAST — Bandit (Python static security analysis)
#   5. Trivy container scan on built Docker images (if Docker available)
#
# Artifacts: security reports retained 30 days
# =============================================================================

name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Also run weekly to catch newly disclosed CVEs in dependencies
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 06:00 UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # Required for SARIF upload to GitHub Security tab

jobs:
  # ── 1. Secret Detection (Gitleaks) ──────────────────────────────────────
  secret-detection:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for Gitleaks

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        # Gitleaks scans the entire git history for secrets.
        # Fails if any hardcoded API keys, passwords, or tokens are found.

  # ── 2. Python Dependency Audit ───────────────────────────────────────────
  python-audit:
    name: Python Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit and application dependencies
        run: |
          pip install --upgrade pip pip-audit
          pip install -r requirements.txt

      - name: Run pip-audit vulnerability scan
        run: |
          pip-audit \
            --requirement requirements.txt \
            --format json \
            --output pip-audit-report.json \
            --vulnerability-service pypi \
            || true   # Don't fail the step — let the report speak
          pip-audit \
            --requirement requirements.txt \
            --vulnerability-service pypi
        # First pass: generate JSON report (for artifact upload)
        # Second pass: human-readable output (may fail build on critical CVEs)

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: backend/pip-audit-report.json
          retention-days: 30

  # ── 3. Python SAST — Bandit ──────────────────────────────────────────────
  bandit:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r app/ \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output bandit-report.json \
            --exclude app/tests \
            || true
          # Print human-readable summary
          bandit -r app/ \
            --severity-level medium \
            --confidence-level medium \
            --exclude app/tests \
            -f txt
        continue-on-error: true
        # Advisory mode: SAST findings are reported but don't fail the build
        # Change continue-on-error to false to enforce in production

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: backend/bandit-report.json
          retention-days: 30

  # ── 4. Node.js Dependency Audit ──────────────────────────────────────────
  node-audit:
    name: Node.js Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run npm audit
        run: |
          npm audit --json > npm-audit-report.json || true
          npm audit --audit-level=high
        # Fails on HIGH or CRITICAL severity vulnerabilities
        # JSON report always generated for artifact upload

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: frontend/npm-audit-report.json
          retention-days: 30

  # ── 5. Trivy Container Vulnerability Scan ────────────────────────────────
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    # Only run on pushes (not PRs) to save build time
    if: github.event_name == 'push' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: false
          tags: documind-backend:scan
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan — backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: documind-backend:scan
          format: "sarif"
          output: "trivy-backend.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"   # Advisory — don't fail the build

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Trivy human-readable summary
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: documind-backend:scan
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

  # ── Security Summary Gate ─────────────────────────────────────────────────
  security-complete:
    name: "✅ Security Complete"
    runs-on: ubuntu-latest
    needs: [secret-detection, python-audit, bandit, node-audit]
    if: always()

    steps:
      - name: Verify critical security checks passed
        run: |
          # Secret detection is a hard gate — commits with secrets must not merge
          if [[ "${{ needs.secret-detection.result }}" != "success" ]]; then
            echo "❌ Secret detection failed — remove secrets from commit history"
            exit 1
          fi
          # npm audit (high/critical) is a hard gate
          if [[ "${{ needs.node-audit.result }}" != "success" ]]; then
            echo "❌ npm audit found HIGH/CRITICAL vulnerabilities"
            exit 1
          fi
          echo "✅ All critical security checks passed"
          echo "ℹ️  pip-audit and Bandit reports are advisory — check artifacts"
