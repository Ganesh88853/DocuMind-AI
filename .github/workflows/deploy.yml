# =============================================================================
# DocuMind AI — Production Deploy Workflow
# =============================================================================
# Triggers ONLY on push to main (not PRs — never deploy unreviewed code).
# Requires ALL test/quality/security checks to pass first.
#
# Deployment targets:
#   Frontend → Vercel (auto-deployed via Vercel Git Integration)
#   Backend  → Render (deploy hook triggered from this workflow)
#
# Steps:
#   1. Run full test suite (gate — must pass before deploy)
#   2. Deploy backend to Render (deploy hook)
#   3. Wait for Render health check to pass
#   4. Run smoke tests against production
#   5. Post deployment status notification
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
  # Allow manual trigger for emergency deploys
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip tests before deploy (emergency only)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false   # Never cancel a production deploy

permissions:
  contents: read
  deployments: write

jobs:
  # ── Pre-deploy Gate: All tests must pass ─────────────────────────────────────
  pre-deploy-tests:
    name: Pre-Deploy Test Gate
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: documind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/documind_test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/documind_test
      JWT_SECRET_KEY: ci-test-secret-key-at-least-32-chars-long
      BCRYPT_ROUNDS: "4"
      ENVIRONMENT: testing
      DEBUG: "false"
      GEMINI_API_KEY: fake-key-for-ci

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Apply migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: python -m pytest tests/ -q --tb=short --cov=app --cov-fail-under=60

      - name: Run frontend type check and tests
        working-directory: frontend
        run: |
          npm ci --frozen-lockfile
          npm run type-check
          npm test

  # ── Deploy Backend to Render ──────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: pre-deploy-tests
    if: always() && (needs.pre-deploy-tests.result == 'success' || github.event.inputs.skip_tests == 'true')

    environment:
      name: production
      url: ${{ vars.BACKEND_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy
        # Render exposes a deploy hook URL — add it as a GitHub secret
        # Get it from: Render Dashboard → Service → Settings → Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret not set."
            echo "   Add it in: GitHub → Repository → Settings → Secrets → Actions"
            echo "   Get the URL from: Render Dashboard → Service → Settings → Deploy Hook"
            echo ""
            echo "Skipping Render trigger — Render will auto-deploy on git push if connected."
          else
            echo "Triggering Render deploy..."
            curl -sf --max-time 30 \
              -X POST \
              "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
              > /dev/null
            echo "✅ Render deploy triggered"
          fi

      - name: Wait for backend to become healthy
        run: |
          BACKEND_URL="${{ vars.BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            echo "ℹ️  BACKEND_URL variable not set — skipping health wait"
            echo "   Set it in: GitHub → Repository → Settings → Variables → Actions"
            exit 0
          fi

          echo "Waiting for $BACKEND_URL/health to pass..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BACKEND_URL/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend healthy after ${i}x attempts"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS — waiting 15s..."
            sleep 15
          done
          echo "❌ Backend did not become healthy within 10 minutes"
          exit 1

  # ── Smoke Tests against Production ───────────────────────────────────────────
  smoke-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: vars.BACKEND_URL != ''

    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          chmod +x scripts/smoke-test.sh
          BACKEND_URL="${{ vars.BACKEND_URL }}" bash scripts/smoke-test.sh
        continue-on-error: true
        # Smoke tests are advisory — they don't block the deploy
        # but the output will show in the GitHub Actions log

      - name: Full health check
        run: |
          chmod +x scripts/health-check.sh
          BACKEND_URL="${{ vars.BACKEND_URL }}" bash scripts/health-check.sh

  # ── Vercel deploys automatically via Git Integration ─────────────────────────
  # Vercel watches the 'main' branch and deploys the 'frontend/' directory.
  # No explicit step needed here — Vercel handles it.
  # This job just surfaces the Vercel URL as a deploy output.
  vercel-info:
    name: Frontend (Vercel — Auto Deploy)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Vercel deployment info
        run: |
          echo "✅ Frontend is deployed automatically by Vercel on push to main"
          echo "   Configure at: https://vercel.com/dashboard"
          echo "   Set VITE_API_BASE_URL to: ${{ vars.BACKEND_URL }}"
          if [ -n "${{ vars.FRONTEND_URL }}" ]; then
            echo "   Frontend URL: ${{ vars.FRONTEND_URL }}"
          fi

  # ── Deployment Summary ────────────────────────────────────────────────────────
  deployment-summary:
    name: "🚀 Deployment Summary"
    runs-on: ubuntu-latest
    needs: [deploy-backend, smoke-tests, vercel-info]
    if: always()

    steps:
      - name: Print deployment summary
        run: |
          echo ""
          echo "════════════════════════════════════════"
          echo "  DocuMind AI — Deployment Summary"
          echo "════════════════════════════════════════"
          echo "  Commit:   ${{ github.sha }}"
          echo "  Branch:   ${{ github.ref_name }}"
          echo "  Actor:    ${{ github.actor }}"
          echo "  Backend:  ${{ vars.BACKEND_URL || 'not configured' }}"
          echo "  Frontend: ${{ vars.FRONTEND_URL || 'auto (Vercel)' }}"
          echo ""
          echo "  Backend deploy:  ${{ needs.deploy-backend.result }}"
          echo "  Smoke tests:     ${{ needs.smoke-tests.result }}"
          echo "════════════════════════════════════════"
