# =============================================================================
# DocuMind AI — Unified Test Suite (Master)
# =============================================================================
# Runs the complete test suite for both backend and frontend.
# This is the PRIMARY gate for PR merges.
#
# Triggers: All pushes to main/develop, all Pull Requests
# No path filter — always runs on any change.
#
# Summary job at the end allows branch protection rules to use a single
# required check ("Tests Complete") rather than specifying all individual jobs.
# =============================================================================

name: Tests

on:
  push:
    branches: [main, develop, "feature/**", "bugfix/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend Tests ─────────────────────────────────────────────────────────
  backend:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: documind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/documind_test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/documind_test
      JWT_SECRET_KEY: ci-test-secret-key-at-least-32-chars-long
      BCRYPT_ROUNDS: "4"
      ENVIRONMENT: testing
      DEBUG: "false"
      GEMINI_API_KEY: fake-key-for-ci

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Apply migrations
        run: alembic upgrade head

      - name: Run full test suite
        run: |
          python -m pytest tests/ \
            --tb=short \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=junit.xml \
            -q

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-py${{ matrix.python-version }}
          path: |
            backend/coverage.xml
            backend/junit.xml
          retention-days: 30

  # ── Frontend Tests ────────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests (Node 22)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: TypeScript type check
        run: npm run type-check

      - name: Run Vitest with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-node22
          path: frontend/coverage/
          retention-days: 30

  # ── Summary Gate ──────────────────────────────────────────────────────────
  # Branch protection rules should require THIS job (not individual matrix jobs)
  # This way, adding new matrix entries doesn't break protection rules.
  tests-complete:
    name: "✅ Tests Complete"
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()

    steps:
      - name: Check all tests passed
        run: |
          if [[ "${{ needs.backend.result }}" != "success" ]]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          if [[ "${{ needs.frontend.result }}" != "success" ]]; then
            echo "❌ Frontend tests failed"
            exit 1
          fi
          echo "✅ All tests passed"
