name: "🐛 Bug Report"
description: "Report a bug or unexpected behavior in DocuMind AI"
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out this form as completely as possible.

  - type: checkboxes
    id: existing-issue
    attributes:
      label: "Is there an existing issue for this?"
      description: "Please search to see if an issue already exists for the bug you encountered."
      options:
        - label: "I have searched the existing issues"
          required: true

  - type: dropdown
    id: affected-area
    attributes:
      label: "Affected Area"
      description: "Which part of the application is affected?"
      options:
        - "Frontend (UI)"
        - "Backend (API)"
        - "Authentication"
        - "Document Upload / OCR"
        - "AI Chat / Assistant"
        - "Semantic Search"
        - "Bookmarks / Reminders"
        - "Docker / Infrastructure"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of what the bug is."
      placeholder: "What went wrong?"
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: "Steps to Reproduce"
      description: "Provide exact steps to reproduce the behavior."
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "Expected Behavior"
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: "Actual Behavior"
      description: "What actually happened? Include error messages, screenshots, or logs."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Please provide your environment details."
      value: |
        - OS: [e.g. Windows 11, macOS 14, Ubuntu 22.04]
        - Browser: [e.g. Chrome 120, Firefox 121]
        - Node.js version: [e.g. 22.x]
        - Python version: [e.g. 3.12]
        - Docker version: [e.g. 24.x]
        - DocuMind version / commit: [e.g. main@abc1234]
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: "Add any other context about the problem here (logs, screenshots, etc.)"
