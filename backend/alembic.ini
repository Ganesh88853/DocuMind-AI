# DocuMind AI — Alembic configuration
# Generated for async SQLAlchemy with asyncpg driver

[alembic]
script_location = migrations
prepend_sys_path = .

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone to use when rendering the date within the migration file
# as well as the filename.
timezone = UTC

# max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Version path separator
version_path_separator = os

# Set to "true" to run the environment during the "revision" command
revision_environment = false

# SQLAlchemy url — overridden dynamically in env.py via Settings
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/documind_ai


[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
